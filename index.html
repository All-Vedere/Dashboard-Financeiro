<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #ededea;
    --text-primary: #1a1a18; --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.18);
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c; --bg-secondary: #2a2a27; --bg-tertiary: #141412;
      --text-primary: #f0ede8; --text-secondary: #9c9990;
      --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.18);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; font-size: 15px; }
  header { background: var(--bg-primary); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 1rem 0; }
  .brand-icon { width: 34px; height: 34px; background: #3266ad; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }
  .brand-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .brand-sub { font-size: 12px; color: var(--text-secondary); }
  .header-right { display: flex; align-items: center; gap: 10px; padding: 0.75rem 0; }
  .status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
  .status-dot.error { background: #D85A30; }
  .status-dot.loading { background: #BA7517; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 6px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-main { background: var(--bg-primary); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; }
  .nav-main-btn { background: none; border: none; border-bottom: 2.5px solid transparent; padding: 13px 20px; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 7px; transition: color 0.15s; margin-bottom: -0.5px; }
  .nav-main-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-main-btn:hover:not(.active) { color: var(--text-primary); }
  .nav-main-btn.active { color: #3266ad; border-bottom-color: #3266ad; }
  .nav-sub { background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; gap: 4px; }
  .nav-sub-btn { background: none; border: 0.5px solid transparent; border-radius: var(--radius-md) var(--radius-md) 0 0; padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; margin-bottom: -0.5px; transition: background 0.12s; }
  .nav-sub-btn:hover:not(.active) { background: var(--bg-tertiary); color: var(--text-primary); }
  .nav-sub-btn.active { background: var(--bg-primary); color: var(--text-primary); border-color: var(--border); border-bottom-color: var(--bg-primary); }
  main { padding: 2rem; max-width: 1280px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: var(--text-secondary); }
  .filter-row select { font-size: 13px; padding: 6px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; outline: none; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .kpi { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem 1.25rem; }
  .kpi-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-value { font-size: 22px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .kpi-delta.pos { color: #0F6E56; }
  .kpi-delta.neg { color: #993C1D; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 1.5rem; }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
  .chart-wrap { position: relative; width: 100%; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .error-msg { background: #FAECE7; color: #993C1D; border-radius: var(--radius-md); padding: 1.25rem; font-size: 14px; line-height: 1.7; }
  @media (prefers-color-scheme: dark) { .error-msg { background: #3a1a10; color: #F0997B; } }
  .loading-msg { color: var(--text-secondary); font-size: 14px; padding: 3rem; text-align: center; }
  @media (max-width: 600px) { main { padding: 1rem; } header, .nav-main, .nav-sub { padding: 0 1rem; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div>
      <div class="brand-name">Dashboard Financeiro</div>
      <div class="brand-sub">Conectado ao Google Sheets · atualiza a cada 60s</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <span class="status-dot loading" id="status-dot"></span>
      <span id="status-text">Carregando...</span>
    </div>
    <button class="btn" onclick="loadAllData()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Atualizar
    </button>
  </div>
</header>

<nav class="nav-main">
  <button class="nav-main-btn active" onclick="switchMain('receita', this)">
    <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    Receita
  </button>
  <button class="nav-main-btn" onclick="switchMain('custos', this)">
    <svg viewBox="0 0 24 24"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
    Custos
  </button>
</nav>

<div id="subnav-receita" class="nav-sub">
  <button class="nav-sub-btn active" onclick="switchSub('receita-vendas', this, 'receita')">Vendas</button>
  <button class="nav-sub-btn" onclick="switchSub('receita-entradas', this, 'receita')">Entradas</button>
</div>
<div id="subnav-custos" class="nav-sub" style="display:none">
  <button class="nav-sub-btn active" onclick="switchSub('custos-compras', this, 'custos')">Compra de Produtos</button>
  <button class="nav-sub-btn" onclick="switchSub('custos-operacional', this, 'custos')">Operacional</button>
</div>

<main>
  <div id="sec-receita-vendas"     class="section active"><div class="loading-msg">Carregando...</div></div>
  <div id="sec-receita-entradas"   class="section"><div class="loading-msg">Carregando...</div></div>
  <div id="sec-custos-compras"     class="section"><div class="loading-msg">Carregando...</div></div>
  <div id="sec-custos-operacional" class="section"><div class="loading-msg">Carregando...</div></div>
</main>

<script>
/* ── Configuração ── */
const SHEET_KEY = '1koEuU5hkGMQFW4eWV9lVeQhQYohW_1SjumulYpOotXU';

const GID = {
  'receita-vendas':     '0',
  'receita-entradas':   '1269492013',
  'custos-compras':     '2101872163',
  'custos-operacional': '1641746023'
};

const LABELS = {
  'receita-vendas':     'Receita — Vendas',
  'receita-entradas':   'Receita — Entradas',
  'custos-compras':     'Custos — Compra de Produtos',
  'custos-operacional': 'Custos — Operacional'
};

const IS_REC = { 'receita-vendas': true, 'receita-entradas': true, 'custos-compras': false, 'custos-operacional': false };
const PAL_R  = ['#3266ad','#1D9E75','#7F77DD','#BA7517','#888780','#85B7EB'];
const PAL_C  = ['#D85A30','#BA7517','#7F77DD','#1D9E75','#3266ad','#888780'];

const store  = {};
const charts = {};
let currentMain = 'receita';
let currentSub  = { receita: 'receita-vendas', custos: 'custos-compras' };

/* ── Navegação ── */
function switchMain(name, btn) {
  currentMain = name;
  document.querySelectorAll('.nav-main-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('subnav-receita').style.display = name === 'receita' ? 'flex' : 'none';
  document.getElementById('subnav-custos').style.display  = name === 'custos'  ? 'flex' : 'none';
  activateSection(currentSub[name]);
}

function switchSub(id, btn, main) {
  currentSub[main] = id;
  document.getElementById('subnav-' + main).querySelectorAll('.nav-sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activateSection(id);
}

function activateSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
}

/* ── Fetch via Google Visualization API (sem CORS) ── */
function fetchGViz(secId) {
  return new Promise((resolve, reject) => {
    const cbName = '__gviz_' + secId.replace(/-/g,'_') + '_' + Date.now();
    const gid = GID[secId];
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_KEY}/gviz/tq?tqx=out:json&tq=select+*&gid=${gid}&callback=${cbName}`;

    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('Timeout ao carregar ' + LABELS[secId]));
    }, 15000);

    window[cbName] = function(raw) {
      clearTimeout(timeout);
      delete window[cbName];
      try {
        const table = raw.table;
        if (!table || !table.cols) { reject(new Error('Sem dados')); return; }
        const headers = table.cols.map(c => c.label || c.id);
        const rows = (table.rows || []).map(r => {
          const obj = {};
          headers.forEach((h, i) => {
            const cell = r.c && r.c[i];
            obj[h] = cell ? (cell.f || (cell.v !== null ? String(cell.v) : '')) : '';
          });
          return obj;
        }).filter(r => Object.values(r).some(v => v));
        resolve(rows);
      } catch(e) { reject(e); }
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Erro de rede em ' + LABELS[secId])); };
    document.head.appendChild(script);
    setTimeout(() => { try { document.head.removeChild(script); } catch(e){} }, 20000);
  });
}

/* ── Utils ── */
function parseNum(v) {
  if (!v) return 0;
  return parseFloat(String(v).replace(/[^0-9.,-]/g,'').replace(',','.')) || 0;
}
function fmt(n) {
  if (Math.abs(n)>=1e6) return 'R$ '+(n/1e6).toFixed(2)+'M';
  if (Math.abs(n)>=1e3) return 'R$ '+(n/1e3).toFixed(1)+'k';
  return 'R$ '+n.toFixed(2);
}
function fmtS(n) {
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+'k';
  return Math.round(n).toString();
}
function groupBy(rows, key, vk) {
  const m = {};
  rows.forEach(r => { const k=r[key]||'Outros'; m[k]=(m[k]||0)+parseNum(r[vk]); });
  return m;
}
function topN(obj, n=6) { return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n); }
function detectCols(rows, vh, ch) {
  const cols = Object.keys(rows[0]||{});
  const find = ws => cols.find(c=>ws.some(w=>c.toLowerCase().includes(w)))||cols[0];
  return {
    valor:     find(vh),
    data:      find(['data','date','mês','mes','month','período','periodo','competência','competencia']),
    categoria: find(ch),
    extra:     find(['vendedor','cliente','fornecedor','região','regiao','centro','departamento','setor','canal'])
  };
}
function destroySection(id) {
  if (!charts[id]) return;
  Object.values(charts[id]).forEach(c => { try { c.destroy(); } catch(e){} });
  charts[id] = {};
}

/* ── Render ── */
function renderSection(secId) {
  const rows = store[secId];
  const el   = document.getElementById('sec-' + secId);
  const isR  = IS_REC[secId];
  const lbl  = LABELS[secId];
  const pal  = isR ? PAL_R : PAL_C;

  destroySection(secId);
  charts[secId] = {};

  if (!rows || !rows.length) {
    el.innerHTML = `<div class="error-msg"><strong>Sem dados em ${lbl}.</strong><br>Verifique se a aba existe e está publicada.</div>`;
    return;
  }

  const vh = isR ? ['receita','valor','total','venda','fatura','entrada','amount'] : ['custo','despesa','valor','total','amount','compra'];
  const ch = isR ? ['categoria','produto','tipo','item','serviço','servico','descrição','descricao','canal'] : ['categoria','tipo','item','descrição','descricao','produto','fornecedor','centro'];
  const cols = detectCols(rows, vh, ch);
  const allC = Object.keys(rows[0]);
  const total = rows.reduce((s,r)=>s+parseNum(r[cols.valor]),0);
  const count = rows.length;
  const media = count ? total/count : 0;
  const byP   = Object.entries(groupBy(rows, cols.data, cols.valor)).sort((a,b)=>a[0].localeCompare(b[0]));
  const byCat = topN(groupBy(rows, cols.categoria, cols.valor));
  const hasEx = cols.extra && cols.extra !== cols.categoria;
  const byEx  = hasEx ? topN(groupBy(rows, cols.extra, cols.valor), 5) : null;
  const maxP  = byP.length ? byP.reduce((a,b)=>a[1]>b[1]?a:b) : null;
  const uid   = secId.replace(/-/g,'_');

  el.innerHTML = `
    <div class="filter-row">
      <label>Agrupar por:</label>
      <select id="sel-${uid}" onchange="reGroup('${secId}')">
        ${allC.map(c=>`<option value="${c}"${c===cols.categoria?' selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">${isR?'Total de receita':'Total de custos'}</div><div class="kpi-value">${fmt(total)}</div></div>
      <div class="kpi"><div class="kpi-label">${isR?'Transações':'Lançamentos'}</div><div class="kpi-value">${count.toLocaleString('pt-BR')}</div></div>
      <div class="kpi"><div class="kpi-label">${isR?'Ticket médio':'Média por lançamento'}</div><div class="kpi-value">${fmt(media)}</div></div>
      ${maxP?`<div class="kpi"><div class="kpi-label">${isR?'Melhor período':'Período mais alto'}</div><div class="kpi-value" style="font-size:16px">${maxP[0]}</div><div class="kpi-delta ${isR?'pos':'neg'}">${fmt(maxP[1])}</div></div>`:''}
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-title">Evolução ao longo do tempo</div>
      <div class="legend"><span><span class="legend-dot" style="background:${pal[0]}"></span>${lbl}</span></div>
      <div class="chart-wrap" style="height:240px"><canvas id="line-${uid}" role="img" aria-label="Evolução de ${lbl}">Evolução por período.</canvas></div>
    </div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-title">Por categoria</div>
        <div class="legend" id="leg-bar-${uid}"></div>
        <div class="chart-wrap" style="height:240px"><canvas id="bar-${uid}" role="img" aria-label="${lbl} por categoria">Por categoria.</canvas></div>
      </div>
      <div class="card" id="ex-${uid}" style="${byEx?'':'display:none'}">
        <div class="card-title" id="ex-title-${uid}">Por ${cols.extra}</div>
        <div class="legend" id="leg-donut-${uid}"></div>
        <div class="chart-wrap" style="height:240px"><canvas id="donut-${uid}" role="img" aria-label="Distribuição">Distribuição.</canvas></div>
      </div>
    </div>`;

  /* linha */
  charts[secId].line = new Chart(document.getElementById(`line-${uid}`).getContext('2d'), {
    type:'line',
    data:{ labels:byP.map(p=>p[0]), datasets:[{ label:lbl, data:byP.map(p=>Math.round(p[1])), borderColor:pal[0], backgroundColor:pal[0]+'22', fill:true, tension:0.35, pointRadius:3 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>'R$'+fmtS(v),font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}}, x:{ticks:{font:{size:11},maxRotation:45,autoSkip:true}} } }
  });

  renderBar(secId, byCat, pal, uid);

  if (byEx) {
    document.getElementById(`ex-title-${uid}`).textContent = 'Por ' + cols.extra;
    document.getElementById(`leg-donut-${uid}`).innerHTML = byEx.map((e,i)=>`<span><span class="legend-dot" style="background:${pal[i%pal.length]}"></span>${e[0]}</span>`).join('');
    charts[secId].donut = new Chart(document.getElementById(`donut-${uid}`).getContext('2d'), {
      type:'doughnut',
      data:{ labels:byEx.map(e=>e[0]), datasets:[{ data:byEx.map(e=>Math.round(e[1])), backgroundColor:byEx.map((_,i)=>pal[i%pal.length]), borderWidth:1.5 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.label}: R$${fmtS(ctx.raw)}`}} } }
    });
  }
}

function renderBar(secId, byCat, pal, uid) {
  const leg = document.getElementById(`leg-bar-${uid}`);
  if (leg) leg.innerHTML = byCat.map((e,i)=>`<span><span class="legend-dot" style="background:${pal[i%pal.length]}"></span>${e[0]}</span>`).join('');
  if (charts[secId] && charts[secId].bar) { charts[secId].bar.destroy(); }
  charts[secId] = charts[secId] || {};
  charts[secId].bar = new Chart(document.getElementById(`bar-${uid}`).getContext('2d'), {
    type:'bar',
    data:{ labels:byCat.map(e=>e[0]), datasets:[{ label:'Valor', data:byCat.map(e=>Math.round(e[1])), backgroundColor:byCat.map((_,i)=>pal[i%pal.length]) }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>'R$'+fmtS(v),font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}}, x:{ticks:{font:{size:11},maxRotation:30,autoSkip:false}} } }
  });
}

function reGroup(secId) {
  const rows = store[secId]; if (!rows) return;
  const uid  = secId.replace(/-/g,'_');
  const gc   = document.getElementById(`sel-${uid}`)?.value; if (!gc) return;
  const isR  = IS_REC[secId]; const pal = isR ? PAL_R : PAL_C;
  const vh   = isR ? ['receita','valor','total','venda','fatura'] : ['custo','despesa','valor','total'];
  const cols = detectCols(rows, vh, []);
  renderBar(secId, topN(groupBy(rows, gc, cols.valor)), pal, uid);
}

/* ── Status ── */
function setStatus(state, msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').className = 'status-dot' + (state==='ok'?'':state==='error'?' error':' loading');
}

/* ── Load ── */
async function loadAllData() {
  setStatus('loading', 'Atualizando...');
  const keys = Object.keys(GID);
  const results = await Promise.allSettled(keys.map(k => fetchGViz(k)));
  let errors = [];
  results.forEach((r,i) => {
    const k = keys[i];
    if (r.status === 'fulfilled') { store[k] = r.value; renderSection(k); }
    else { errors.push(LABELS[k]); document.getElementById('sec-'+k).innerHTML = `<div class="error-msg"><strong>Erro ao carregar ${LABELS[k]}</strong><br>${r.reason?.message||'Falha'}</div>`; }
  });
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  setStatus(errors.length ? 'error' : 'ok', errors.length ? `Erro em: ${errors.join(', ')}` : `Atualizado às ${now}`);
}

loadAllData();
setInterval(loadAllData, 60000);
</script>
</body>
</html>
