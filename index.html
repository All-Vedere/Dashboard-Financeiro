<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#ffffff;--surface2:#f7f5f2;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9c9990;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --gold:#b8952a;
  --blue:#3266ad;--teal:#1D9E75;--red:#c0392b;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:#1a1a18;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:10px;padding:.85rem 0}
.brand-logo svg{width:28px;height:28px}
.brand-name{font-size:14px;font-weight:600;color:#e8e4de;letter-spacing:.02em}
.header-right{display:flex;align-items:center;gap:10px;padding:.6rem 0}
.status-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:#9c9990;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 12px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.status-dot.error{background:#D85A30}
.status-dot.loading{background:#b8952a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{display:flex;align-items:center;gap:6px;background:none;border:0.5px solid rgba(255,255,255,0.2);border-radius:var(--r);padding:6px 14px;font-size:12px;color:#9c9990;cursor:pointer;transition:background .15s}
.btn-refresh:hover{background:rgba(255,255,255,0.08);color:#e8e4de}
.btn-refresh svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
nav{background:#1a1a18;border-bottom:2px solid var(--gold);padding:0 2rem;display:flex}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:11px 22px;font-size:13px;font-weight:600;color:#6b6b67;cursor:pointer;letter-spacing:.03em;transition:color .15s}
.nav-btn:hover:not(.active){color:#b8b4ae}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.page-title-bar{background:var(--gold);padding:6px 2rem}
.page-title-bar h1{font-size:15px;font-weight:700;color:#1a1a18;letter-spacing:.02em}
main{padding:1.5rem 2rem;max-width:1400px;margin:0 auto}
.page{display:none}
.page.active{display:block}
.top-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.gauge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.25rem 1.5rem}
.card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
.card-sub{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.metrics-row{display:flex;gap:2rem;margin-bottom:1rem;flex-wrap:wrap}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}
.metric-value.gold{color:var(--gold)}
.chart-wrap{position:relative;width:100%}
.gauge-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.25rem 1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.gauge-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.75rem}
.gauge-value{font-size:28px;font-weight:700;margin-bottom:.25rem}
.gauge-value.pos{color:var(--teal)}
.gauge-value.neg{color:var(--red)}
.gauge-desc{font-size:11px;color:var(--text3)}
.custos-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.25rem}
.kpi-box{background:var(--surface2);border-radius:var(--r);padding:1rem 1.25rem}
.kpi-box-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kpi-box-value{font-size:20px;font-weight:700;color:var(--text)}
.kpi-box-value.neg{color:var(--red)}
.loading-msg{color:var(--text3);font-size:14px;padding:3rem;text-align:center}
.error-msg{background:#fff0ee;color:#993C1D;border-radius:var(--r);padding:1.25rem;font-size:13px;line-height:1.7;margin-bottom:1rem}
@media(max-width:900px){.top-grid,.gauge-grid,.custos-grid{grid-template-columns:1fr}main{padding:1rem}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M4 26 L16 6 L28 26" stroke="#b8952a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 19 L23 19" stroke="#b8952a" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-name">DASHBOARD FINANCEIRO</div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <span class="status-dot loading" id="status-dot"></span>
      <span id="status-text">Carregando...</span>
    </div>
    <button class="btn-refresh" onclick="loadAllData()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Atualizar
    </button>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="switchPage('receitas',this)">RECEITAS</button>
  <button class="nav-btn" onclick="switchPage('custos',this)">CUSTOS</button>
</nav>

<div id="page-receitas" class="page active">
  <div class="page-title-bar"><h1>Receitas</h1></div>
  <main>
    <div class="top-grid">
      <div class="card" id="card-fat"><div class="loading-msg">Carregando...</div></div>
      <div class="card" id="card-lucro"><div class="loading-msg">Carregando...</div></div>
      <div class="card" id="card-entradas"><div class="loading-msg">Carregando...</div></div>
    </div>
    <div class="gauge-grid">
      <div class="gauge-card" id="gauge-margem"><div class="loading-msg" style="padding:1rem">Carregando...</div></div>
      <div class="gauge-card" id="gauge-roi"><div class="loading-msg" style="padding:1rem">Carregando...</div></div>
      <div class="gauge-card" id="gauge-lpe"><div class="loading-msg" style="padding:1rem">Carregando...</div></div>
    </div>
  </main>
</div>

<div id="page-custos" class="page">
  <div class="page-title-bar"><h1>Custos</h1></div>
  <main id="custos-main"><div class="loading-msg">Carregando...</div></main>
</div>

<script>
/* ── URLs CSV públicas (sem CORS via fetch direto não funciona; usamos proxy via script tag + GViz) ── */
/* Chave pública extraída dos links CSV fornecidos */
const PUB_KEY = '2PACX-1vSxQpUBRh18L9L30SGHDvO7rsYmwleGr099LvUqrbpSpCadZZ34gVkDNrDhrEmf0jt9UFY9zyvUFNiw';

const SHEETS = {
  vendas:      { gid: '0' },
  entradas:    { gid: '1269492013' },
  compras:     { gid: '2101872163' },
  operacional: { gid: '1641746023' }
};

const store  = {};
const charts = {};

/* ── Nav ── */
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ── Fetch CSV via script tag (evita CORS) ── */
function fetchCSV(key) {
  return new Promise((resolve, reject) => {
    const gid = SHEETS[key].gid;
    // Usa o endpoint pub?output=csv via fetch normal — funciona de HTTPS para HTTPS (GitHub Pages → Google)
    const url = `https://docs.google.com/spreadsheets/d/e/${PUB_KEY}/pub?gid=${gid}&single=true&output=csv`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => resolve(parseCSV(text)))
      .catch(reject);
  });
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result.map(v => v.replace(/^"|"$/g, '').trim());
}

/* ── Helpers ── */
function parseNum(v) {
  if (v == null || v === '') return 0;
  // Formato BR: 1.234,56 → 1234.56
  let s = String(v).trim();
  // Remove R$, espaços
  s = s.replace(/R\$\s*/g, '').trim();
  // Se tem vírgula como decimal (BR)
  if (s.match(/\d,\d{1,2}$/)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    s = s.replace(',', '');
  }
  return parseFloat(s.replace(/[^0-9.\-]/g, '')) || 0;
}

function fmtBRL(n) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e6) return sign + 'R$ ' + (abs/1e6).toFixed(2).replace('.',',') + ' mi';
  if (abs >= 1e3) return sign + 'R$ ' + (abs/1e3).toFixed(2).replace('.',',') + ' mil';
  return sign + 'R$ ' + abs.toFixed(2).replace('.',',');
}

function fmtShort(n) {
  const abs = Math.abs(n), s = n < 0 ? '-' : '';
  if (abs >= 1e6) return s + (abs/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return s + (abs/1e3).toFixed(0) + 'k';
  return Math.round(n).toString();
}

function fmtPct(n) {
  return (n >= 0 ? '+' : '') + n.toFixed(2).replace('.', ',') + '%';
}

function groupByMonth(rows, col) {
  const map = {};
  rows.forEach(r => {
    const raw = (r['Data'] || r['data'] || '').trim();
    if (!raw) return;
    let key = '';
    // DD/MM/YYYY ou DD-MM-YYYY
    const brDate = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (brDate) {
      const dia = brDate[1], mes = brDate[2].padStart(2,'0'), ano = brDate[3];
      key = ano + '-' + mes;
    } else {
      // YYYY-MM-DD
      const isoDate = raw.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/);
      if (isoDate) key = isoDate[1] + '-' + isoDate[2];
      else key = raw.slice(0,7);
    }
    if (!key) return;
    map[key] = (map[key] || 0) + parseNum(r[col]);
  });
  return Object.keys(map).sort().map(k => [k, map[k]]);
}

function monthLabel(k) {
  // k = "2026-01" → "jan/26"
  const [y, m] = k.split('-');
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return (months[parseInt(m)-1] || m) + '/' + (y||'').slice(2);
}

function destroyChart(id) {
  if (charts[id]) { try { charts[id].destroy(); } catch(e){} delete charts[id]; }
}

/* ── Gauge SVG ── */
function gaugeHTML(pct, color) {
  const norm = Math.max(0, Math.min(1, (pct + 100) / 200));
  const angle = norm * 180;
  const rad = (angle - 90) * Math.PI / 180;
  const r = 52, cx = 75, cy = 68;
  const nx = (cx + r * Math.cos(rad)).toFixed(1);
  const ny = (cy + r * Math.sin(rad)).toFixed(1);
  const large = angle > 180 ? 1 : 0;
  return `<svg viewBox="0 0 150 78" width="150" height="78">
    <path d="M23,68 A52,52 0 0,1 127,68" fill="none" stroke="#e8e4de" stroke-width="9" stroke-linecap="round"/>
    <path d="M23,68 A52,52 0 ${large},1 ${nx},${ny}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#333"/>
  </svg>`;
}

/* ══════════════════════════════════════════
   RENDER RECEITAS
══════════════════════════════════════════ */
function renderReceitas() {
  const vendas   = store.vendas   || [];
  const entradas = store.entradas || [];
  const compras  = store.compras  || [];
  const oper     = store.operacional || [];

  /* Detecta coluna de valor em compras/operacional */
  function findCol(rows, hints) {
    if (!rows.length) return null;
    const cols = Object.keys(rows[0]);
    return cols.find(c => hints.some(h => c.toLowerCase().includes(h))) || cols[1];
  }
  const vcCompras = findCol(compras, ['valor','total','custo','compra']);
  const vcOper    = findCol(oper,    ['valor','total','custo','operac']);

  const fatTotal    = vendas.reduce((s,r)   => s + parseNum(r['Faturamento Bruto']), 0);
  const lucroTotal  = vendas.reduce((s,r)   => s + parseNum(r['Lucro Líq.']), 0);
  const entradasTot = entradas.reduce((s,r) => s + parseNum(r['Valor']), 0);
  const custoTotal  = (vcCompras ? compras.reduce((s,r) => s + parseNum(r[vcCompras]), 0) : 0)
                    + (vcOper    ? oper.reduce((s,r)    => s + parseNum(r[vcOper]),    0) : 0);

  const margem = fatTotal   ? (lucroTotal / fatTotal)   * 100 : 0;
  const roi    = custoTotal ? (lucroTotal / custoTotal)  * 100 : 0;
  const lpe    = entradasTot ? (lucroTotal / entradasTot) * 100 : 0;

  const fatMes  = groupByMonth(vendas,   'Faturamento Bruto');
  const lucMes  = groupByMonth(vendas,   'Lucro Líq.');
  const entMes  = groupByMonth(entradas, 'Valor');

  /* CARD FATURAMENTO */
  destroyChart('fat');
  document.getElementById('card-fat').innerHTML = `
    <div class="card-title">Faturamento</div>
    <div class="card-sub">Vendas e Receitas</div>
    <div class="metrics-row">
      <div><div class="metric-label">Faturamento Bruto</div><div class="metric-value gold">${fmtBRL(fatTotal)}</div></div>
      <div><div class="metric-label">Transações</div><div class="metric-value">${vendas.length.toLocaleString('pt-BR')}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-fat" role="img" aria-label="Faturamento mensal">.</canvas></div>`;
  charts.fat = mkLine('ch-fat', fatMes, 'Faturamento Bruto', '#b8952a');

  /* CARD LUCRO */
  destroyChart('lucro');
  const lc = lucroTotal >= 0 ? '#1D9E75' : '#c0392b';
  document.getElementById('card-lucro').innerHTML = `
    <div class="card-title">Lucro</div>
    <div class="card-sub">Ganhos e Proventos</div>
    <div class="metrics-row">
      <div><div class="metric-label">Lucro Líquido Total</div><div class="metric-value" style="color:${lc}">${fmtBRL(lucroTotal)}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-lucro" role="img" aria-label="Lucro mensal">.</canvas></div>`;
  charts.lucro = mkLine('ch-lucro', lucMes, 'Lucro Líq.', '#1D9E75');

  /* CARD ENTRADAS */
  destroyChart('entradas');
  document.getElementById('card-entradas').innerHTML = `
    <div class="card-title">Entradas de Caixa</div>
    <div class="card-sub">Pagamentos Recebidos</div>
    <div class="metrics-row">
      <div><div class="metric-label">Total de Entradas</div><div class="metric-value" style="color:#3266ad">${fmtBRL(entradasTot)}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-entradas" role="img" aria-label="Entradas mensais">.</canvas></div>`;
  charts.entradas = mkLine('ch-entradas', entMes, 'Valor', '#3266ad');

  /* GAUGES */
  const gc = margem >= 0 ? '#1D9E75' : '#c0392b';
  const rc = roi    >= 0 ? '#1D9E75' : '#c0392b';
  const lc2= lpe    >= 0 ? '#1D9E75' : '#c0392b';

  document.getElementById('gauge-margem').innerHTML = `
    <div class="gauge-label">Margem Bruta</div>
    ${gaugeHTML(margem, gc)}
    <div class="gauge-value ${margem>=0?'pos':'neg'}">${fmtPct(margem)}</div>
    <div class="gauge-desc">Lucro Líq. / Faturamento Bruto</div>`;

  document.getElementById('gauge-roi').innerHTML = `
    <div class="gauge-label">ROI</div>
    ${gaugeHTML(roi, rc)}
    <div class="gauge-value ${roi>=0?'pos':'neg'}">${fmtPct(roi)}</div>
    <div class="gauge-desc">Lucro Líq. / Custo Total</div>`;

  document.getElementById('gauge-lpe').innerHTML = `
    <div class="gauge-label">Lucro sobre Entradas</div>
    ${gaugeHTML(lpe, lc2)}
    <div class="gauge-value ${lpe>=0?'pos':'neg'}">${fmtPct(lpe)}</div>
    <div class="gauge-desc">Lucro Líq. / Entradas de Caixa</div>`;
}

/* ══════════════════════════════════════════
   RENDER CUSTOS
══════════════════════════════════════════ */
function renderCustos() {
  const compras = store.compras || [];
  const oper    = store.operacional || [];

  function findCol(rows, hints) {
    if (!rows.length) return null;
    const cols = Object.keys(rows[0]);
    return cols.find(c => hints.some(h => c.toLowerCase().includes(h))) || cols[1];
  }
  const vcC = findCol(compras, ['valor','total','custo']);
  const vcO = findCol(oper,    ['valor','total','custo']);

  const totC = vcC ? compras.reduce((s,r) => s + parseNum(r[vcC]), 0) : 0;
  const totO = vcO ? oper.reduce((s,r)    => s + parseNum(r[vcO]), 0) : 0;
  const totG = totC + totO;

  const cMes = groupByMonth(compras, vcC || 'Valor');
  const oMes = groupByMonth(oper,    vcO || 'Valor');

  const allM = [...new Set([...cMes.map(p=>p[0]), ...oMes.map(p=>p[0])])].sort();
  const cmMap = Object.fromEntries(cMes);
  const omMap = Object.fromEntries(oMes);

  destroyChart('cbar'); destroyChart('cline'); destroyChart('oline');

  document.getElementById('custos-main').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-box"><div class="kpi-box-label">Custo Total</div><div class="kpi-box-value neg">${fmtBRL(totG)}</div></div>
      <div class="kpi-box"><div class="kpi-box-label">Compra de Produtos</div><div class="kpi-box-value">${fmtBRL(totC)}</div></div>
      <div class="kpi-box"><div class="kpi-box-label">Operacional</div><div class="kpi-box-value">${fmtBRL(totO)}</div></div>
      <div class="kpi-box"><div class="kpi-box-label">% Compras</div><div class="kpi-box-value">${totG?((totC/totG)*100).toFixed(1)+'%':'—'}</div></div>
      <div class="kpi-box"><div class="kpi-box-label">% Operacional</div><div class="kpi-box-value">${totG?((totO/totG)*100).toFixed(1)+'%':'—'}</div></div>
    </div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">Evolução de Custos</div>
      <div class="card-sub">Compras vs Operacional por mês</div>
      <div class="chart-wrap" style="height:250px"><canvas id="ch-cbar" role="img" aria-label="Custos mensais">.</canvas></div>
    </div>
    <div class="custos-grid">
      <div class="card">
        <div class="card-title">Compra de Produtos</div>
        <div class="card-sub">Evolução mensal</div>
        <div class="chart-wrap" style="height:200px"><canvas id="ch-cline" role="img" aria-label="Compras mensais">.</canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Custos Operacionais</div>
        <div class="card-sub">Evolução mensal</div>
        <div class="chart-wrap" style="height:200px"><canvas id="ch-oline" role="img" aria-label="Operacional mensal">.</canvas></div>
      </div>
    </div>`;

  charts.cbar = new Chart(document.getElementById('ch-cbar').getContext('2d'), {
    type: 'bar',
    data: {
      labels: allM.map(monthLabel),
      datasets: [
        { label:'Compra de Produtos', data: allM.map(m=>Math.round(cmMap[m]||0)), backgroundColor:'#D85A30cc', borderRadius:3 },
        { label:'Operacional',        data: allM.map(m=>Math.round(omMap[m]||0)), backgroundColor:'#BA7517cc', borderRadius:3 }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, labels:{ color:'#6b6b67', font:{size:11}, boxWidth:10 } } },
      scales:{ x:{ stacked:true, ticks:{ font:{size:10}, color:'#9c9990' } },
               y:{ stacked:true, ticks:{ callback:v=>'R$'+fmtShort(v), font:{size:10}, color:'#9c9990' }, grid:{color:'rgba(0,0,0,0.05)'} } } }
  });

  charts.cline = mkLine('ch-cline', cMes, 'Compras', '#D85A30');
  charts.oline = mkLine('ch-oline', oMes, 'Operacional', '#BA7517');
}

/* ── Chart.js line helper ── */
function mkLine(id, series, label, color) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: {
      labels: series.map(p => monthLabel(p[0])),
      datasets: [{ label, data: series.map(p => Math.round(p[1])),
        borderColor: color, backgroundColor: color + '22',
        fill: true, tension: .4, pointRadius: 3, pointBackgroundColor: color }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, labels:{ color:'#6b6b67', font:{size:11}, boxWidth:10 } } },
      scales:{ y:{ ticks:{ callback:v=>'R$'+fmtShort(v), font:{size:10}, color:'#9c9990' }, grid:{color:'rgba(0,0,0,0.05)'} },
               x:{ ticks:{ font:{size:10}, color:'#9c9990', maxRotation:45 } } } }
  });
}

/* ── Status ── */
function setStatus(state, msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').className = 'status-dot'+(state==='ok'?'':state==='error'?' error':' loading');
}

/* ── Load ── */
async function loadAllData() {
  setStatus('loading','Atualizando...');
  const keys = ['vendas','entradas','compras','operacional'];
  const results = await Promise.allSettled(keys.map(k => fetchCSV(k)));
  let errors = [];
  results.forEach((r,i) => {
    if (r.status === 'fulfilled') store[keys[i]] = r.value;
    else { errors.push(keys[i]); console.error(keys[i], r.reason); }
  });
  renderReceitas();
  renderCustos();
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  setStatus(errors.length?'error':'ok', errors.length?`Erro: ${errors.join(', ')}`:`Atualizado às ${now}`);
}

loadAllData();
setInterval(loadAllData, 60000);
