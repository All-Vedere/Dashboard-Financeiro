<title>Dashboard Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#fff;--surface2:#f7f5f2;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9c9990;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --gold:#b8952a;--teal:#1D9E75;--red:#c0392b;--blue:#3266ad;
  --r:10px;--rl:14px;
  --sidebar-w:220px;
  --bottomnav-h:68px;
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:"Montserrat",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100%;font-size:14px}

/* ══ HEADER ══ */
header{background:#0f2344;padding:env(safe-area-inset-top) 1.25rem 0;display:flex;align-items:center;justify-content:space-between;min-height:calc(52px + env(safe-area-inset-top));flex-shrink:0;position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:9px}
.brand-logo svg{width:24px;height:24px}
.brand-name{font-size:13px;font-weight:600;color:#e8e4de;letter-spacing:.04em}
.header-right{display:flex;align-items:center;gap:8px}
.status-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#9c9990;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 10px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.status-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.status-dot.error{background:#D85A30}
.status-dot.loading{background:#b8952a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{display:flex;align-items:center;gap:5px;background:none;border:0.5px solid rgba(255,255,255,0.18);border-radius:8px;padding:5px 11px;font-size:12px;color:#9c9990;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-refresh:hover{background:rgba(255,255,255,0.08);color:#e8e4de}
.btn-refresh svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ APP BODY ══ */
.app-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* ══ SIDEBAR (desktop) ══ */
aside{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#0a1c38;display:flex;flex-direction:column;padding:1.25rem 0;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;flex-shrink:0}
.sidebar-label{font-size:10px;font-weight:700;color:#ffffff;letter-spacing:.12em;text-transform:uppercase;padding:0 1.25rem;margin:.25rem 0 .5rem}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-left:3px solid transparent;padding:11px 1.25rem;font-size:13px;font-weight:500;color:#c8c4be;cursor:pointer;transition:color .15s,background .15s,border-color .15s;text-align:left}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}

.content{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0}

.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}
.gauge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}
.custos-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1rem}

/* ══ CARDS ══ */
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.1rem 1.25rem}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}

.metric-value.gold{color:var(--gold)}
.chart-wrap{position:relative;width:100%}
.gauge-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.1rem 1.25rem;display:flex;flex-direction:column;align-items:center;text-align:center}
.gauge-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.6rem}
.gauge-value{font-size:24px;font-weight:700;margin-bottom:.2rem}
.gauge-value.pos{color:var(--teal)}
.gauge-value.neg{color:var(--red)}
.gauge-desc{font-size:11px;color:var(--text3)}
.kpi-box{background:var(--surface2);border-radius:var(--r);padding:.9rem 1.1rem}
.kpi-box-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi-box-value{font-size:18px;font-weight:700;color:var(--text)}
.kpi-box-value.neg{color:var(--red)}

.error-msg{background:#fff0ee;color:#993C1D;border-radius:var(--r);padding:1rem;font-size:13px;line-height:1.6;margin-bottom:1rem}

/* ══ BOTTOM NAV (mobile) ══ */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav-h);background:#0a1c38;border-top:1px solid rgba(255,255,255,0.1);z-index:30;padding-bottom:env(safe-area-inset-bottom)}

<script>
/* ── URLs CSV públicas (sem CORS via fetch direto não funciona; usamos proxy via script tag + GViz) ── */
/* Chave pública extraída dos links CSV fornecidos */
const PUB_KEY = '2PACX-1vSxQpUBRh18L9L30SGHDvO7rsYmwleGr099LvUqrbpSpCadZZ34gVkDNrDhrEmf0jt9UFY9zyvUFNiw';

const SHEETS = {
  vendas:      { gid: '0' },
  entradas:    { gid: '1269492013' },
  compras:     { gid: '2101872163' },
  operacional: { gid: '1641746023' }
};

const store  = {};
const charts = {};

/* ── Nav ── */
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ── Fetch CSV via script tag (evita CORS) ── */
function fetchCSV(key) {
  return new Promise((resolve, reject) => {
    const gid = SHEETS[key].gid;
    // Usa o endpoint pub?output=csv via fetch normal — funciona de HTTPS para HTTPS (GitHub Pages → Google)
    const url = `https://docs.google.com/spreadsheets/d/e/${PUB_KEY}/pub?gid=${gid}&single=true&output=csv`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => resolve(parseCSV(text)))
      .catch(reject);
  });
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result.map(v => v.replace(/^"|"$/g, '').trim());
}

/* ── Helpers ── */
function parseNum(v) {
  if (v == null || v === '') return 0;
  // Formato BR: 1.234,56 → 1234.56
  let s = String(v).trim();
  // Remove R$, espaços
  s = s.replace(/R\$\s*/g, '').trim();
  // Se tem vírgula como decimal (BR)
  if (s.match(/\d,\d{1,2}$/)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    s = s.replace(',', '');
  }
  return parseFloat(s.replace(/[^0-9.\-]/g, '')) || 0;
}

function fmtBRL(n) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e6) return sign + 'R$ ' + (abs/1e6).toFixed(2).replace('.',',') + ' mi';
  if (abs >= 1e3) return sign + 'R$ ' + (abs/1e3).toFixed(2).replace('.',',') + ' mil';
  return sign + 'R$ ' + abs.toFixed(2).replace('.',',');
}

function fmtShort(n) {
  const abs = Math.abs(n), s = n < 0 ? '-' : '';
  if (abs >= 1e6) return s + (abs/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return s + (abs/1e3).toFixed(0) + 'k';
  return Math.round(n).toString();
}

function fmtPct(n) {
  return (n >= 0 ? '+' : '') + n.toFixed(2).replace('.', ',') + '%';
}

function groupByMonth(rows, col) {
  const map = {};
  rows.forEach(r => {
    const raw = (r['Data'] || r['data'] || '').trim();
    if (!raw) return;
    let key = '';
    // DD/MM/YYYY ou DD-MM-YYYY
    const brDate = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (brDate) {
      const dia = brDate[1], mes = brDate[2].padStart(2,'0'), ano = brDate[3];
      key = ano + '-' + mes;
    } else {
      // YYYY-MM-DD
      const isoDate = raw.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/);
      if (isoDate) key = isoDate[1] + '-' + isoDate[2];
      else key = raw.slice(0,7);
    }
    if (!key) return;
    map[key] = (map[key] || 0) + parseNum(r[col]);
  });
  return Object.keys(map).sort().map(k => [k, map[k]]);
}

function monthLabel(k) {
  // k = "2026-01" → "jan/26"
  const [y, m] = k.split('-');
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return (months[parseInt(m)-1] || m) + '/' + (y||'').slice(2);
}

function destroyChart(id) {
  if (charts[id]) { try { charts[id].destroy(); } catch(e){} delete charts[id]; }
}

/* ── Gauge SVG ── */
function gaugeHTML(pct, color) {
  // 0%=esquerda, 30%=direita, semicírculo horário
  const norm = Math.max(0, Math.min(1, pct / 30));
  const r = 55, cx = 90, cy = 75;
  const sx = cx - r; // 35  (ponto 0%)
  const ex = cx + r; // 145 (ponto 30%)

  // Ângulo do valor: PI (esq) → 0 (dir)
  const ang = Math.PI - norm * Math.PI;
  const nx = +(cx + r * Math.cos(ang)).toFixed(2);
  const ny = +(cy - r * Math.sin(ang)).toFixed(2);

  // Estratégia: se norm <= 0.5, large=0; se norm > 0.5, large=1
  // Mas sempre sweep=1 (horário), partindo de sx,cy até nx,ny
  const large = norm > 0.5 ? 1 : 0;

  // Arco restante (cinza): do ponto do valor até o fim (ex,cy)
  // norm restante = 1 - norm
  const remLarge = (1 - norm) > 0.5 ? 1 : 0;

  return \`<svg viewBox="0 0 180 95" style="width:100%;max-width:220px;height:auto;display:block;margin:0 auto">
    <!-- Arco cinza: do valor até direita -->
    <path d="M\${nx},\${ny} A\${r},\${r} 0 \${remLarge},1 \${ex},\${cy}" fill="none" stroke="#e8e4de" stroke-width="10" stroke-linecap="round"/>
    <!-- Arco colorido: da esquerda até o valor -->
    <path d="M\${sx},\${cy} A\${r},\${r} 0 \${large},1 \${nx},\${ny}" fill="none" stroke="\${color}" stroke-width="10" stroke-linecap="round"/>
    <!-- Ponteiro -->
    <line x1="\${cx}" y1="\${cy}" x2="\${nx}" y2="\${ny}" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="\${cx}" cy="\${cy}" r="4.5" fill="#1a1a18"/>
    <!-- Labels -->
    <text x="\${sx}" y="90" font-size="9" fill="#9c9990" text-anchor="middle">0%</text>
    <text x="\${cx}" y="14" font-size="9" fill="#9c9990" text-anchor="middle">15%</text>
    <text x="\${ex}" y="90" font-size="9" fill="#9c9990" text-anchor="middle">30%</text>
  </svg>\`;
}

/* ══════════════════════════════════════════
   RENDER RECEITAS
══════════════════════════════════════════ */
function renderReceitas() {
  const vendas   = store.vendas   || [];
  const entradas = store.entradas || [];
  const compras  = store.compras  || [];
  const oper     = store.operacional || [];

  /* Detecta coluna de valor em compras/operacional */
  function findCol(rows, hints) {
    if (!rows.length) return null;
    const cols = Object.keys(rows[0]);
    return cols.find(c => hints.some(h => c.toLowerCase().includes(h))) || cols[1];
  }
  const vcCompras = findCol(compras, ['valor','total','custo','compra']);
  const vcOper    = findCol(oper,    ['valor','total','custo','operac']);

  const fatTotal    = vendas.reduce((s,r)   => s + parseNum(r['Faturamento Bruto']), 0);
  const lucroTotal  = vendas.reduce((s,r)   => s + parseNum(r['Lucro Líq.']), 0);
  const entradasTot = entradas.reduce((s,r) => s + parseNum(r['Valor']), 0);
  const custoCompras = vcCompras ? compras.reduce((s,r) => s + parseNum(r[vcCompras]), 0) : 0;
  const custoOper    = vcOper    ? oper.reduce((s,r)    => s + parseNum(r[vcOper]),    0) : 0;
  const custoTotal   = custoCompras + custoOper;

  const margem = fatTotal  ? (lucroTotal / fatTotal)  * 100 : 0;
  const roi    = custoOper ? (lucroTotal / custoOper) * 100 : 0;
  const lpe    = entradasTot ? (lucroTotal / entradasTot) * 100 : 0;

  const fatMes  = groupByMonth(vendas,   'Faturamento Bruto');
  const lucMes  = groupByMonth(vendas,   'Lucro Líq.');
  const entMes  = groupByMonth(entradas, 'Valor');

  /* CARD FATURAMENTO */
  destroyChart('fat');
  document.getElementById('card-fat').innerHTML = `
    <div class="card-title">Faturamento</div>
    <div class="card-sub">Vendas e Receitas</div>
    <div class="metrics-row">
      <div><div class="metric-label">Faturamento Bruto</div><div class="metric-value gold">${fmtBRL(fatTotal)}</div></div>
      <div><div class="metric-label">Transações</div><div class="metric-value">${vendas.length.toLocaleString('pt-BR')}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-fat" role="img" aria-label="Faturamento mensal">.</canvas></div>`;
  charts.fat = mkLine('ch-fat', fatMes, 'Faturamento Bruto', '#b8952a');

  /* CARD LUCRO */
  destroyChart('lucro');
  const lc = lucroTotal >= 0 ? '#1D9E75' : '#c0392b';
  document.getElementById('card-lucro').innerHTML = `
    <div class="card-title">Lucro Operacional</div>
    <div class="card-sub">Ganhos e Proventos</div>
    <div class="metrics-row">
      <div><div class="metric-label">Lucro Líquido Total</div><div class="metric-value" style="color:${lc}">${fmtBRL(lucroTotal)}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-lucro" role="img" aria-label="Lucro mensal">.</canvas></div>`;
  charts.lucro = mkLine('ch-lucro', lucMes, 'Lucro Líq.', '#1D9E75');

  /* CARD ENTRADAS */
  destroyChart('entradas');
  document.getElementById('card-entradas').innerHTML = `
    <div class="card-title">Entradas de Caixa</div>
    <div class="card-sub">Pagamentos Recebidos</div>
    <div class="metrics-row">
      <div><div class="metric-label">Total de Entradas</div><div class="metric-value" style="color:#3266ad">${fmtBRL(entradasTot)}</div></div>
    </div>
    <div class="chart-wrap" style="height:170px"><canvas id="ch-entradas" role="img" aria-label="Entradas mensais">.</canvas></div>`;
  charts.entradas = mkLine('ch-entradas', entMes, 'Valor', '#3266ad');

  /* GAUGES */
  const gc = margem >= 0 ? '#1D9E75' : '#c0392b';
  const rc = roi    >= 0 ? '#1D9E75' : '#c0392b';
  const lc2= lpe    >= 0 ? '#1D9E75' : '#c0392b';

  document.getElementById('gauge-margem').innerHTML = `
    <div class="gauge-label">Margem Bruta</div>
    ${gaugeHTML(margem, gc)}
    <div class="gauge-value ${margem>=0?'pos':'neg'}">${fmtPct(margem)}</div>
    <div class="gauge-desc">Lucro Líq. / Faturamento Bruto</div>`;

  document.getElementById('gauge-roi').innerHTML = `
    <div class="gauge-label">ROI Operacional</div>
    ${gaugeHTML(roi, rc)}
    <div class="gauge-value ${roi>=0?'pos':'neg'}">${fmtPct(roi)}</div>
    <div class="gauge-desc">Lucro Líq. / Custos Operacionais</div>`;

  document.getElementById('gauge-lpe').innerHTML = `
    <div class="gauge-label">Lucro sobre Entradas</div>
    ${gaugeHTML(lpe, lc2)}
    <div class="gauge-value ${lpe>=0?'pos':'neg'}">${fmtPct(lpe)}</div>
    <div class="gauge-desc">Lucro Líq. / Entradas de Caixa</div>`;

  /* ── KPI boxes resumo ── */
  const lluido      = entradasTot - custoTotal;
  const margemEmp   = entradasTot ? (lluido / entradasTot) * 100 : 0;
  const roiEmp      = custoTotal  ? (lluido / custoTotal)  * 100 : 0;
  const lluidoColor = lluido    >= 0 ? '#1D9E75' : '#c0392b';
  const meColor     = margemEmp >= 0 ? '#1D9E75' : '#c0392b';
  const reColor     = roiEmp    >= 0 ? '#1D9E75' : '#c0392b';

  const kpiLluido = document.getElementById('kpi-lluido');
  if (kpiLluido) kpiLluido.innerHTML = `
    <div class="kpi-box-label">Lucro Líq. Total</div>
    <div class="kpi-box-value" style="color:${lluidoColor}">${fmtBRL(lluido)}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Entradas − Todos os Custos</div>`;

  const kpiMargem = document.getElementById('kpi-margem-emp');
  if (kpiMargem) kpiMargem.innerHTML = `
    <div class="kpi-box-label">Margem Empresa</div>
    <div class="kpi-box-value" style="color:${meColor}">${fmtPct(margemEmp)}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Lucro Líq. / Entradas de Caixa</div>`;

  const kpiRoi = document.getElementById('kpi-roi-emp');
  if (kpiRoi) kpiRoi.innerHTML = `
    <div class="kpi-box-label">ROI Empresa</div>
    <div class="kpi-box-value" style="color:${reColor}">${fmtPct(roiEmp)}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Lucro Líq. / Todos os Custos</div>`;

}

/* ══════════════════════════════════════════
   RENDER CUSTOS
══════════════════════════════════════════ */

/* ── groupByMonth com coluna customizável ── */
function groupByMonthCol(rows, col) {
  const map = {};
  rows.forEach(r => {
    const raw = (r['Data'] || r['data'] || '').trim();
    if (!raw) return;
    let key = '';
    const brDate = raw.match(/^(\d{1,2})[\\/\-](\d{1,2})[\\/\-](\d{4})$/);
    if (brDate) key = brDate[3] + '-' + brDate[2].padStart(2,'0');
    else {
      const iso = raw.match(/^(\d{4})[\\/\-](\d{2})[\\/\-](\d{2})$/);
      if (iso) key = iso[1] + '-' + iso[2];
      else key = raw.slice(0,7);
    }
    if (!key) return;
    map[key] = (map[key] || 0) + parseNum(r[col]);
  });
  return Object.keys(map).sort().map(k => [k, map[k]]);
}

/* ── Chart.js line helper ── */
function mkLine(id, series, label, color) {
  return new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: {
      labels: series.map(p => monthLabel(p[0])),
      datasets: [{ label, data: series.map(p => Math.round(p[1])),
        borderColor: color, backgroundColor: color + '22',
        fill: true, tension: .4, pointRadius: 3, pointBackgroundColor: color }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, labels:{ color:'#6b6b67', font:{size:11}, boxWidth:10 } } },
      scales:{ y:{ ticks:{ callback:v=>'R$'+fmtShort(v), font:{size:10}, color:'#9c9990' }, grid:{color:'rgba(0,0,0,0.05)'} },
               x:{ ticks:{ font:{size:10}, color:'#9c9990', maxRotation:45 } } } }
  });
}

/* ── Status ── */
function setStatus(state, msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').className = 'status-dot'+(state==='ok'?'':state==='error'?' error':' loading');
}

/* ── Load ── */
async function loadAllData() {
  setStatus('loading','Atualizando...');
  const keys = ['vendas','entradas','compras','operacional'];
  const results = await Promise.allSettled(keys.map(k => fetchCSV(k)));
  let errors = [];
  results.forEach((r,i) => {
    if (r.status === 'fulfilled') store[keys[i]] = r.value;
    else { errors.push(keys[i]); console.error(keys[i], r.reason); }
  });
  renderReceitas();
  renderCustos();
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  setStatus(errors.length?'error':'ok', errors.length?`Erro: ${errors.join(', ')}`:`Atualizado às ${now}`);
}

loadAllData();
</script>

<script>
// Sobrescreve switchPage para sincronizar sidebar + bottomnav
const _origSwitch = switchPage;
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  // Sincroniza bottom nav
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const bnavBtn = document.querySelector(`.bnav-btn[onclick*="${name}"]`);
  if (bnavBtn) bnavBtn.classList.add('active');
}

function switchPageMobile(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  // Sincroniza sidebar
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const sideBtn = document.querySelector(`.nav-btn[onclick*="${name}"]`);
  if (sideBtn) sideBtn.classList.add('active');
  // Scroll to top
  document.querySelector('.content').scrollTop = 0;
}
</script>
